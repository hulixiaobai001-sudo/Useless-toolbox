<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具箱</title>
<style>
body{background:#0a0a12;color:#fff;font-family:sans-serif;padding:1rem;text-align:center}
h1{color:#f0a030;font-size:1.3rem}
.g{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;max-width:500px;margin:1rem auto}
.c{background:#15152a;border:1px solid #333;border-radius:8px;padding:0.6rem 0.2rem;cursor:pointer;font-size:0.7rem}
.c:active{background:#222}
.big{font-size:1.5rem;display:block}
</style>
</head>
<body>
<h1>🦊 工具箱</h1>
<div class="g" id="g"></div>

<div id="m" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:99;justify-content:center;align-items:center;padding:1rem" onclick="if(event.target==this)h()">
<div style="background:#15152a;border:1px solid #333;border-radius:12px;padding:1rem;max-width:380px;width:100%">
<div style="text-align:right"><button onclick="h()" style="background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer">×</button></div>
<h2 id="t"></h2>
<div id="b"></div>
<div id="r"></div>
</div></div>

<script>
function h(){document.getElementById('m').style.display='none'}
function sh(title,html){
  document.getElementById('t').textContent=title;
  document.getElementById('b').innerHTML=html;
  document.getElementById('r').innerHTML='';
  document.getElementById('m').style.display='flex';
}

// 硬编码网格
const g=document.getElementById('g');
const tools=[
  ['🦊','🐶译'],
  ['⏳','加载'],
  ['📅','不宜'],
  ['⏰','倒计时'],
  ['💡','建议'],
  ['🎰','老虎机'],
  ['🎲','骰子'],
  ['🪙','硬币'],
  ['📳','震动'],
  ['🎨','颜色'],
  ['🃏','抽卡'],
  ['🔮','水晶球'],
  ['🎪','人品'],
  ['🌊','深海'],
  ['📟','忙'],
  ['🎯','飞镖'],
  ['⏱️','摸鱼'],
  ['🐋','信箱']
];

for(let i=0;i<tools.length;i++){
  const c=document.createElement('div');
  c.className='c';
  c.innerHTML='<span class="big">'+tools[i][0]+'</span>'+tools[i][1];
  c.onclick=function(){openTool(i)};
  g.appendChild(c);
}

function openTool(i){
  const tools2=[
    function(){sh('🦊 狐狸语','<textarea id="fi" rows="2" style="width:100%;padding:0.5rem;background:#0a0a12;border:1px solid #333;border-radius:6px;color:#fff;margin:0.3rem 0"></textarea><button onclick="ft()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">翻译</button><div id="fo" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')},
    function(){sh('⏳ 假装加载','<div style="background:#222;border-radius:4px;height:10px;margin:0.5rem 0"><div id="bar" style="width:0%;height:100%;background:linear-gradient(90deg,#f0a030,#e06030);border-radius:4px;transition:width 0.3s"></div></div><button onclick="sl()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">开始</button>')},
    function(){sh('📅 今日不宜','<button onclick="gd()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">看看</button><div id="do" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')},
    function(){sh('⏰ 倒计时','<div id="to" style="padding:0.5rem;background:#0a0a12;border-radius:6px;text-align:center">计算中...</div>')},
    function(){sh('💡 人生建议','<button onclick="ga()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">给我建议</button><div id="ao" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')},
    function(){sh('🎰 老虎机','<div id="sd" style="font-size:2rem;text-align:center;padding:0.5rem">🎰</div><div id="sm" style="text-align:center;font-size:0.8rem"></div><button onclick="ps()" style="margin-top:0.3rem;padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">拉杆</button>')},
    function(){sh('🎲 骰子','<div id="dd" style="font-size:2.5rem;text-align:center;padding:0.5rem">🎲</div><button onclick="rd(6)" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">d6</button> <button onclick="rd(20)" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">d20</button> <button onclick="rd(100)" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">d100</button><div id="dio" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')},
    function(){sh('🪙 抛硬币','<div id="cd" style="font-size:3rem;text-align:center;padding:0.5rem">🪙</div><button onclick="fc()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">抛</button><div id="co" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')},
    function(){sh('📳 震动','<p style="color:#888;font-size:0.8rem">点击按钮震动手机</p><button onclick="navigator.vibrate(50)" style="margin:0.2rem;padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">轻</button><button onclick="navigator.vibrate(100)" style="margin:0.2rem;padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">中</button><button onclick="navigator.vibrate(300)" style="margin:0.2rem;padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">强</button>')},
    function(){sh('🎨 随机颜色','<div id="cb" style="height:80px;border-radius:6px;background:#333;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-bottom:0.3rem"></div><button onclick="gc()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">生成</button><div id="co2" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')},
    function(){sh('🃏 抽卡','<div id="gd" style="font-size:2rem;text-align:center;padding:0.5rem">🎴</div><div id="gr" style="text-align:center;font-size:0.75rem"></div><button onclick="pgg()" style="margin:0.2rem;padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">抽</button><button onclick="p10()" style="margin:0.2rem;padding:0.5rem 1rem;background:#333;border:none;border-radius:6px;color:#fff;cursor:pointer">十连</button><div id="go" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')},
    function(){sh('🔮 水晶球','<div style="font-size:3rem;text-align:center;padding:0.3rem">🔮</div><input id="cq" style="width:100%;padding:0.5rem;background:#0a0a12;border:1px solid #333;border-radius:6px;color:#fff;margin:0.3rem 0" placeholder="问问题..."><button onclick="ac()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">占卜</button><div id="cbo" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')},
    function(){sh('🎪 今日人品','<button onclick="cl()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">测人品</button><div id="lko" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')},
    function(){sh('🌊 深海','<div id="sea" style="padding:0.5rem;background:#0a0a12;border-radius:6px;min-height:40px;text-align:center;margin-bottom:0.3rem">🌊🐋💧</div><button onclick="ts2()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">调频</button>')},
    function(){sh('📟 假装很忙','<div id="te" style="background:#000;border-radius:6px;padding:0.5rem;font-family:monospace;font-size:0.6rem;color:#5f5;height:150px;overflow:auto;border:1px solid #1a3a1a;margin-bottom:0.3rem"></div><button onclick="tt2()" id="tb" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">开始</button>')},
    function(){sh('🎯 飞镖','<div style="display:flex;gap:0.3rem"><input id="di" style="flex:1;padding:0.5rem;background:#0a0a12;border:1px solid #333;border-radius:6px;color:#fff" placeholder="选项"><button onclick="ad2()" style="padding:0.5rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">+</button></div><div id="dl" style="min-height:1rem;margin:0.3rem 0"></div><button onclick="td2()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">掷</button><div id="do2" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')},
    function(){sh('⏱️ 摸鱼','<div style="display:flex;gap:0.3rem"><input id="sh" type="number" value="17" style="flex:1;padding:0.5rem;background:#0a0a12;border:1px solid #333;border-radius:6px;color:#fff;text-align:center"><span style="display:flex;align-items:center">:</span><input id="sm" type="number" value="0" style="flex:1;padding:0.5rem;background:#0a0a12;border:1px solid #333;border-radius:6px;color:#fff;text-align:center"></div><button onclick="sf()" style="margin-top:0.3rem;padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">开始</button><div id="slo" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;text-align:center;font-size:0.8rem">设时间后点开始</div>')},
    function(){sh('🐋 信箱','<textarea id="wi" rows="2" style="width:100%;padding:0.5rem;background:#0a0a12;border:1px solid #333;border-radius:6px;color:#fff;margin:0.3rem 0"></textarea><button onclick="sw()" style="padding:0.5rem 1rem;background:#f0a030;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer">发送</button><div id="wo" style="margin-top:0.3rem;padding:0.5rem;background:#0a0a12;border-radius:6px;font-size:0.8rem;color:#5f5"></div>')}
  ];
  tools2[i]();
}

// 狐狸语
const fd={'你好':'嗷呜！','谢谢':'蹭蹭～','喜欢':'呜呜❤️','睡觉':'Zzz...','我':'本狐','吗':'嘛？','的':'の','了':'啦','不':'不','是':'素','很':'炒鸡','什么':'啥米','怎么':'咋','知道':'晓得','可以':'阔以','没有':'木有','不要':'不要嘛','！':'！！','？':'？？','。':'～'}
function ft(){const i=document.getElementById('fi').value,r=document.getElementById('fo');let o='';for(let c of i)o+=fd[c]||c;r.textContent=o||'嗷？';}

// 加载
function sl(){let p=0;setInterval(()=>{p=Math.min(p+Math.random()*3,99.8);const e=document.getElementById('bar');if(e)e.style.width=p+'%'},300)}

// 不宜
function gd(){document.getElementById('do').textContent='🔮 不宜：'+['出门','学习','运动','早睡','玩手机','写代码','思考人生','叹气'][Math.floor(Math.random()*8)]}

// 倒计时
setInterval(()=>{const e=document.getElementById('to');if(e&&e.style.display!=='none'){const n=new Date(),t=new Date(n);t.setDate(t.getDate()+1);t.setHours(0,0,0,0);const d=t-n;e.textContent='还剩 '+Math.floor(d/3600000)+'h '+Math.floor((d%3600000)/60000)+'m '+Math.floor((d%60000)/1000)+'s'}},1000)

// 建议
function ga(){document.getElementById('ao').textContent='💡 '+['想做就做','再睡十分钟','你不是懒你是在节能','努力不一定成功但不努力很舒服','多喝热水'][Math.floor(Math.random()*5)]}

// 老虎机
const se2=['🍀','💀','❤️','💰','🔥','🦊','🐋','💎']
function ps(){let c=0;const iv=setInterval(()=>{const e=document.getElementById('sd');if(!e){clearInterval(iv);return}e.textContent=se2[Math.floor(Math.random()*se2.length)]+' '+se2[Math.floor(Math.random()*se2.length)]+' '+se2[Math.floor(Math.random()*se2.length)];c++;if(c>10){clearInterval(iv);const i=[se2[Math.floor(Math.random()*se2.length)],se2[Math.floor(Math.random()*se2.length)],se2[Math.floor(Math.random()*se2.length)]];e.textContent=i.join(' ');const msg=document.getElementById('sm');if(msg)msg.textContent='📜 '+(i[1]==='🍀'?'好运':i[1]==='💀'?'躺平':i[1]==='❤️'?'有人想你':i[1]==='💰'?'破财':i[1]==='🔥'?'冷静':i[1]==='🦊'?'狐狸保佑':i[1]==='🐋'?'小鲸鱼':'珍贵')}},80)}

// 骰子
function rd(s){let c=0;const iv=setInterval(()=>{const e=document.getElementById('dd');if(!e){clearInterval(iv);return}e.textContent=['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];c++;if(c>8){clearInterval(iv);const r=Math.floor(Math.random()*s)+1;e.textContent=r;const o=document.getElementById('dio');if(o){o.textContent='d'+s+' = '+r;o.style.display='block'}}},60)}

// 硬币
function fc(){let c=0;const iv=setInterval(()=>{const e=document.getElementById('cd');if(!e){clearInterval(iv);return}e.textContent=Math.random()>0.5?'👑':'🦊';c++;if(c>10){clearInterval(iv);const r=Math.random()>0.5;e.textContent=r?'👑':'🦊';const o=document.getElementById('co');if(o){o.textContent=r?'正面':'反面';o.style.display='block'}}},60)}

// 颜色
function gc(){const r=Math.floor(Math.random()*200+30),g=Math.floor(Math.random()*200+30),b=Math.floor(Math.random()*200+30);const e=document.getElementById('cb');if(!e)return;e.style.background='rgb('+r+','+g+','+b+')';e.textContent='#'+r.toString(16)+g.toString(16)+b.toString(16);const o=document.getElementById('co2');if(o){o.textContent='RGB('+r+','+g+','+b+')';o.style.display='block'}}

// 抽卡
function dg2(){let a=0;const rn=Math.random();const gp=[{n:'🌟SSR小鲸鱼',r:0.02},{n:'🌟SSR深海',r:0.03},{n:'⭐SR狐狸',r:0.1},{n:'⭐SR月光',r:0.1},{n:'📖R路人',r:0.25},{n:'📖R同桌',r:0.25},{n:'🌿N树叶',r:0.25}];for(const i of gp){a+=i.r;if(rn<a)return i}return gp[6]}
function pgg(){let c=0;const iv=setInterval(()=>{const e=document.getElementById('gd');if(!e){clearInterval(iv);return}e.textContent=['🎴','🃏','⭐','🌟'][Math.floor(Math.random()*4)];c++;if(c>8){clearInterval(iv);const r=dg2();e.textContent=r.n.slice(0,2);const g=document.getElementById('gr');if(g)g.textContent=r.n;const o=document.getElementById('go');if(o){o.textContent='抽到：'+r.n;o.style.display='block'}}},80)}
function p10(){const rs=[];for(let i=0;i<10;i++)rs.push(dg2());const ssr=rs.filter(r=>r.n.includes('SSR'));const e=document.getElementById('gd');if(e)e.textContent=ssr.length?'🌟':'📖';const g=document.getElementById('gr');if(g)g.textContent=ssr.length?ssr.length+'个SSR！':'保底';const o=document.getElementById('go');if(o){o.textContent='十连：\n'+rs.map(r=>r.n).join('\n');o.style.display='block'}}

// 水晶球
function ac(){const q=document.getElementById('cq');if(q&&!q.value.trim()){const o=document.getElementById('cbo');if(o){o.textContent='🔮 先问问题';o.style.display='block'}return}const o=document.getElementById('cbo');if(o){o.textContent='🔮 '+['是的','毫无疑问','好','等等','别急','也许','可以','看不清'][Math.floor(Math.random()*8)];o.style.display='block'}}

// 人品
function cl(){const s=Math.floor(Math.random()*100);const o=document.getElementById('lko');if(o){o.textContent='今日人品：'+s+'分 '+(s>80?'🌟🌟🌟':(s>50?'🌟🌟':'💀'))+(s>80?' 爆棚':(s>50?' 不错':' 躺平'));o.style.display='block'}}

// 深海
function ts2(){const ss=['🌊～','🐋～','💧','～🌊','🐚','💙','🐟'];let w='';for(let i=0;i<12;i++)w+=ss[Math.floor(Math.random()*ss.length)];const e=document.getElementById('sea');if(e)e.textContent=w}

// 终端
let tI2;
function tt2(){const te=document.getElementById('te'),tb=document.getElementById('tb');if(!te||!tb)return;if(tI2){clearInterval(tI2);tI2=null;tb.textContent='开始';return}tb.textContent='停止';tI2=setInterval(()=>{te.innerHTML+='['+new Date().toLocaleTimeString()+'] '+['compiling...','linking...','building...','deploying...','> yarn install','> webpack 62%','> starting...'][Math.floor(Math.random()*7)]+'\n';te.scrollTop=te.scrollHeight;if(te.innerHTML.length>3000)te.innerHTML=te.innerHTML.slice(-2000)},400)}

// 飞镖
let da=[];
function ad2(){const v=document.getElementById('di');if(!v||!v.value.trim())return;da.push(v.value.trim());v.value='';const dl=document.getElementById('dl');if(dl)dl.innerHTML=da.map((o,i)=>'<span style="background:#222;padding:0.1rem 0.4rem;border-radius:4px;font-size:0.65rem;margin:0.1rem">'+o+'<span onclick="rm2('+i+')" style="cursor:pointer;margin-left:0.2rem;color:#888">×</span></span>').join('')}
function rm2(i){da.splice(i,1);const dl=document.getElementById('dl');if(dl)dl.innerHTML=da.map((o,i)=>'<span style="background:#222;padding:0.1rem 0.4rem;border-radius:4px;font-size:0.65rem;margin:0.1rem">'+o+'<span onclick="rm2('+i+')" style="cursor:pointer;margin-left:0.2rem;color:#888">×</span></span>').join('')}
function td2(){if(!da.length){const o=document.getElementById('do2');if(o){o.textContent='加点选项';o.style.display='block'}return}const r=da[Math.floor(Math.random()*da.length)];const o=document.getElementById('do2');if(o){o.textContent='🎯 '+r;o.style.display='block'}}

// 摸鱼
let sI2;
function sf(){const h=parseInt((document.getElementById('sh')||{}).value)||17,m=parseInt((document.getElementById('sm')||{}).value)||0;const e=document.getElementById('slo');if(!e)return;e.style.display='block';if(sI2)clearInterval(sI2);sI2=setInterval(()=>{const n=new Date(),t=new Date(n);t.setHours(h,m,0,0);if(n>t)t.setDate(t.getDate()+1);const d=t-n;e.textContent='还剩 '+Math.floor(d/3600000)+'h '+Math.floor((d%3600000)/60000)+'m '+Math.floor((d%60000)/1000)+'s'},1000)}

// 信箱
function sw(){const i=document.getElementById('wi');const r=document.getElementById('wo');if(!i||!r)return;if(!i.value.trim()){r.textContent='🐋 说呀';r.style.display='block';return}r.textContent='🐋 '+['收到！','记住了','我在听～','你值得','biu～❤️'][Math.floor(Math.random()*5)];r.style.display='block'}
</script>
</body>
</html>
