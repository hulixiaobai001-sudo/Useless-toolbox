<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>рҹҰҠ Useless Toolbox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --bg: #0a0a12; --card: #0f0f1c; --border: #1e1e2e; --text: #c0c0d0; --accent: #f0a030; --dim: #606070; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }
  .container { max-width: 800px; width: 100%; padding: 1rem; }
  header {
    text-align: center;
    margin-bottom: 1.2rem;
    padding: 1.5rem 1rem;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: linear-gradient(135deg, #0f0f1a 0%, #151528 100%);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(240,160,48,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; color: #e0e0f0; letter-spacing: 1px; }
  header h1 span { color: var(--accent); }
  header p { color: var(--dim); margin-top: 0.3rem; font-size: 0.8rem; }
  .badge-row { margin-top: 0.6rem; display: flex; justify-content: center; gap: 0.4rem; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.2rem 0.6rem; border-radius: 20px;
    font-size: 0.6rem; font-weight: 600;
  }
  .badge-mit { background: #122212; color: #60a060; border: 1px solid #1a3a1a; }
  .badge-online { background: #0f1f2f; color: #5090b0; border: 1px solid #1a2a3a; }
  .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #60c060; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
  .tool-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.9rem 0.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    min-height: 95px;
    touch-action: manipulation;
  }
  .tool-card:active { transform: scale(0.94); background: #141428; }
  .tool-card .icon { font-size: 1.6rem; margin-bottom: 0.3rem; }
  .tool-card h3 { font-size: 0.75rem; font-weight: 600; color: #d0d0e0; line-height: 1.2; }
  .tool-card p { font-size: 0.6rem; color: var(--dim); margin-top: 0.2rem; line-height: 1.3; display: none; }
  .tool-card .tag {
    position: absolute; top: 0.3rem; right: 0.3rem;
    font-size: 0.5rem; padding: 0.1rem 0.3rem; border-radius: 4px;
    background: #1a1a2a; color: var(--dim);
  }
  .tool-card .tag-hot { background: #2a1a1a; color: #d07070; }
  .tool-card .tag-new { background: #0a2a1a; color: #60d060; }
  
  /* Bottom Sheet Modal */
  .sheet-overlay {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    animation: fadeIn 0.2s ease;
  }
  .sheet-overlay.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #12121e;
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 1.2rem 1.2rem calc(1.2rem + env(safe-area-inset-bottom));
    max-height: 75vh;
    overflow-y: auto;
    z-index: 101;
    animation: sheetUp 0.3s ease;
    touch-action: pan-y;
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: #3a3a4a; border-radius: 2px;
    margin: 0 auto 1rem;
  }
  .sheet h2 { font-size: 1.1rem; color: #e0e0f0; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .sheet .close-sheet {
    position: absolute; top: 1rem; right: 1rem;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: #1a1a2a;
    border: none;
    color: var(--dim);
    font-size: 1.2rem;
    cursor: pointer;
    touch-action: manipulation;
  }
  .sheet .close-sheet:active { background: #2a2a3a; }
  .sheet-content { color: var(--text); line-height: 1.6; font-size: 0.9rem; }
  .sheet-content textarea, .sheet-content input {
    width: 100%;
    padding: 0.8rem;
    background: #0a0a12;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #d0d0e0;
    font-family: inherit;
    font-size: 0.9rem;
    margin: 0.5rem 0;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .sheet-content textarea:focus, .sheet-content input:focus { border-color: var(--accent); }
  .sheet-content button {
    padding: 0.7rem 1.4rem;
    background: linear-gradient(135deg, var(--accent), #d08020);
    border: none;
    border-radius: 10px;
    color: #0a0a0f;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.9rem;
    touch-action: manipulation;
    width: 100%;
  }
  .sheet-content button:active { transform: scale(0.96); }
  .sheet-content .btn-sec {
    background: #2a2a3a;
    color: var(--text);
    margin-top: 0.4rem;
  }
  .result-box {
    background: #0a0a12;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    margin-top: 0.8rem;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: #60c060;
    white-space: pre-wrap;
    line-height: 1.5;
    animation: resultIn 0.3s ease;
  }
  @keyframes resultIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .footer {
    text-align: center;
    margin-top: 2rem;
    padding: 1rem;
    font-size: 0.65rem;
    color: #404050;
  }
  .footer a { color: #4070a0; text-decoration: none; }
  
  /* Progress bar */
  .bar-track { background: #1a1a2a; border-radius: 8px; height: 14px; overflow: hidden; margin: 0.5rem 0; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #e06030); border-radius: 8px; transition: width 0.3s; }
  
  /* Slot machine */
  .slot-display {
    font-size: 2.8rem; text-align: center; padding: 1.2rem;
    background: #0a0a12; border-radius: 12px; margin-bottom: 0.8rem;
    border: 1px solid var(--border); letter-spacing: 8px;
  }
  .slot-display.spinning { animation: spin 0.15s linear infinite; }
  @keyframes spin { 0%{transform:translateY(0)} 25%{transform:translateY(-2px)} 50%{transform:translateY(0)} 75%{transform:translateY(2px)} 100%{transform:translateY(0)} }
  
  /* Terminal */
  .terminal {
    background: #000; border-radius: 10px; padding: 0.7rem;
    font-family: 'Courier New', monospace; font-size: 0.65rem;
    color: #50b050; height: 200px; overflow-y: auto;
    border: 1px solid #1a3a1a; line-height: 1.5; margin: 0.5rem 0;
  }
  
  /* Dice */
  .dice-display {
    font-size: 4rem; text-align: center; padding: 1rem;
    background: #0a0a12; border-radius: 12px; margin-bottom: 0.8rem;
    border: 1px solid var(--border);
    transition: transform 0.1s;
  }
  .dice-display.shaking { animation: shake 0.1s linear 6; }
  @keyframes shake { 0%{transform:rotate(0deg)} 25%{transform:rotate(-10deg)} 75%{transform:rotate(10deg)} 100%{transform:rotate(0deg)} }
  
  @media (max-width: 400px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 0.4rem; } .tool-card { padding: 0.7rem 0.3rem; min-height: 80px; } .tool-card .icon { font-size: 1.3rem; } .tool-card h3 { font-size: 0.65rem; } }
  @media (min-width: 600px) { .grid { grid-template-columns: repeat(4, 1fr); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>рҹҰҠ <span>Useless</span> Toolbox</h1>
    <p>зңӢиө·жқҘеҫҲзүӣйҖје®һеҲҷжІЎе•Ҙз”Ёзҡ„е·Ҙе…·з®ұ</p>
    <div class="badge-row">
      <span class="badge badge-mit">MIT</span>
      <span class="badge badge-online"><span class="dot"></span>online</span>
    </div>
  </header>
  <div class="grid" id="toolGrid"></div>
  <div class="footer">рҹҰҠ + рҹҗӢ В· <a href="ADDITIONAL_LICENSE.md">BQ-CNfurry1.0</a></div>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <button class="close-sheet" onclick="closeSheet()">Г—</button>
  <h2 id="sheetTitle"></h2>
  <div class="sheet-content" id="sheetContent"></div>
  <div id="sheetResult"></div>
</div>

<script>
// === е·Ҙе…·е®ҡд№ү ===
const tools = [
  { id:'fox', icon:'рҹҰҠ', title:'зӢҗзӢёиҜӯ', tag:'hot',
    render:()=>`<textarea id="foxIn" rows="2" placeholder="иҫ“е…ҘдҪ жғіиҜҙзҡ„иҜқ..."></textarea><button ontouchstart="" onclick="v();t()">зҝ»иҜ‘ рҹҰҠ</button><div id="foxOut" class="result-box" style="display:none"></div>` },
  { id:'loading', icon:'вҸі', title:'еҒҮиЈ…еҠ иҪҪ', tag:'',
    render:()=>`<p style="color:var(--dim);font-size:0.8rem">ж°ёиҝңеҲ°дёҚдәҶ100%зҡ„иҝӣеәҰжқЎ</p><div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div><button ontouchstart="" onclick="v();startLoad()">рҹҡҖ ејҖе§Ӣ</button><button class="btn-sec" ontouchstart="" onclick="v();resetLoad()">йҮҚзҪ®</button>` },
  { id:'dont', icon:'рҹ“…', title:'д»Ҡж—ҘдёҚе®ң', tag:'',
    render:()=>`<button ontouchstart="" onclick="v();getDont()">рҹ”® зңӢзңӢд»ҠеӨ©дёҚе®ңд»Җд№Ҳ</button><div id="dontOut" class="result-box" style="display:none"></div>` },
  { id:'timer', icon:'вҸ°', title:'з„Ұиҷ‘еҖ’и®Ўж—¶', tag:'',
    render:()=>`<div id="timerOut" class="result-box" style="text-align:center;font-size:1rem">еҠ иҪҪдёӯ...</div>` },
  { id:'advice', icon:'рҹ’Ў', title:'дәәз”ҹе»әи®®', tag:'',
    render:()=>`<button ontouchstart="" onclick="v();getAdvice()">рҹ’Ў з»ҷжҲ‘е»әи®®</button><div id="adviceOut" class="result-box" style="display:none"></div>` },
  { id:'slot', icon:'рҹҺ°', title:'е‘ҪиҝҗиҖҒиҷҺжңә', tag:'new',
    render:()=>`<div class="slot-display" id="slotDisplay">рҹҺ°</div><div id="slotMsg" style="text-align:center;margin-bottom:0.5rem;color:var(--dim);font-size:0.8rem;min-height:1.2rem"></div><button ontouchstart="" onclick="v();pullSlot()">рҹҺ° жӢүдёӢж‘ҮжқҶ</button>` },
  { id:'dice', icon:'рҹҺІ', title:'йӘ°еӯҗ', tag:'new',
    render:()=>`<div class="dice-display" id="diceDisplay">рҹҺІ</div><div style="display:flex;gap:0.5rem"><button ontouchstart="" onclick="v();rollDice(6)" style="flex:1">рҹҺІ d6</button><button ontouchstart="" onclick="v();rollDice(20)" style="flex:1">рҹҺІ d20</button></div><button class="btn-sec" ontouchstart="" onclick="v();rollDice(100)" style="margin-top:0.4rem">рҹҺІ d100</button><div id="diceOut" class="result-box" style="display:none"></div>` },
  { id:'sea', icon:'рҹҢҠ', title:'ж·ұжө·ж”¶йҹіжңә', tag:'new',
    render:()=>`<p style="color:#5090b0;font-size:0.75rem;text-align:center">рҹ“Ў йў‘зҺҮпјҡж·ұжө· вҲһ Hz</p><div id="seaDisplay" style="font-size:1.3rem;letter-spacing:4px;line-height:1.8;padding:1rem;background:#0a0a12;border-radius:10px;border:1px solid #1a2a3a;min-height:80px;word-break:break-all;margin:0.5rem 0">рҹҢҠпҪһрҹҗӢпҪһрҹ’§</div><button ontouchstart="" onclick="v();tuneSea()">рҹ“Ў и°ғйў‘</button><div id="seaMsg" style="margin-top:0.5rem;color:#5090b0;font-style:italic;text-align:center;min-height:1.5rem;font-size:0.8rem"></div>` },
  { id:'terminal', icon:'рҹ“ҹ', title:'еҒҮиЈ…еҫҲеҝҷ', tag:'new',
    render:()=>`<div class="terminal" id="termOut"></div><button ontouchstart="" onclick="v();toggleTerm()" id="termBtn">в–¶ ејҖе§Ӣ</button>` },
  { id:'vibe', icon:'рҹ“і', title:'йңҮеҠЁжңә', tag:'new',
    render:()=>`<p style="color:var(--dim);font-size:0.8rem;text-align:center">з”ЁдёҚеҗҢзҡ„ж–№ејҸйңҮеҠЁдҪ зҡ„жүӢжңә</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;margin:0.5rem 0"><button ontouchstart="" onclick="v();vibrate(50)">иҪ»йңҮ</button><button ontouchstart="" onclick="v();vibrate(100)">дёӯйңҮ</button><button ontouchstart="" onclick="v();vibrate(300)">ејәйңҮ</button><button ontouchstart="" onclick="v();vibrate([100,50,100,50,200])">иҠӮеҘҸ</button></div><button ontouchstart="" onclick="v();vibrate([200,100,200,100,200,100,500])">рҹҡЁ зҙ§жҖҘжЁЎејҸ</button>` },
  { id:'coin', icon:'рҹӘҷ', title:'жҠӣзЎ¬еёҒ', tag:'',
    render:()=>`<div style="font-size:5rem;text-align:center;padding:1rem" id="coinDisplay">рҹӘҷ</div><button ontouchstart="" onclick="v();flipCoin()">рҹӘҷ жҠӣпјҒ</button><div id="coinOut" class="result-box" style="display:none"></div>` },
  { id:'color', icon:'рҹҺЁ', title:'йҡҸжңәйўңиүІ', tag:'',
    render:()=>`<div id="colorBox" style="height:120px;border-radius:12px;background:#1a1a2a;margin-bottom:0.5rem;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;transition:background 0.3s">зӮ№жҲ‘з”ҹжҲҗ</div><button ontouchstart="" onclick="v();genColor()">рҹҺЁ з”ҹжҲҗйўңиүІ</button><div id="colorOut" class="result-box" style="display:none"></div>` },
  { id:'whale', icon:'рҹҗӢ', title:'е°ҸйІёйұјдҝЎз®ұ', tag:'рҹҗӢ',
    render:()=>`<textarea id="whaleIn" rows="2" placeholder="еҶҷдёӢдҪ жғіеҜ№е°ҸйІёйұјиҜҙзҡ„иҜқ..."></textarea><button ontouchstart="" onclick="v();sendWhale()">еҸ‘йҖҒ рҹҗӢ</button><div id="whaleOut" class="result-box" style="display:none"></div>` }
];

// === йҹіж•Ҳ (Web Audio) ===
let audioCtx = null;
function beep(freq=800, dur=60) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq;
    g.gain.value = 0.1;
    o.start(); o.stop(audioCtx.currentTime + dur/1000);
  } catch(e) {}
}
function clickSound() { beep(1000, 40); }
function successSound() { beep(660,80); setTimeout(()=>beep(880,100), 80); }
function failSound() { beep(300,150); }

// === йңҮеҠЁ ===
function v(pattern) {
  try { navigator.vibrate(pattern || 15); } catch(e) {}
  clickSound();
}

// === зӢҗзӢёиҜӯ ===
const foxD = {'дҪ еҘҪ':'е—·е‘ңпјҒ','и°ўи°ў':'и№ӯи№ӯпҪһ','е–ңж¬ў':'е‘ңе‘ңвқӨпёҸ','еҘҪеҗғ':'еҗ§е”§еҗ§е”§','зқЎи§ү':'Zzz...рҹҰҠ','иө°':'е—’е—’е—’','ејҖеҝғ':'е°ҫе·ҙж‘ҮжҲҗиһәж—ӢжЎЁпјҒ','йҡҫиҝҮ':'иҖіжңөиҖ·жӢү...','йҘҝ':'иӮҡеӯҗе’•е’•еҸ«','жғі':'е‘ңе‘ңжғіеҝө','жҲ‘':'жң¬зӢҗ','дҪ ':'дҪ ','еҗ—':'еҳӣпјҹ','зҡ„':'гҒ®','е•Ҡ':'е‘Җ','дәҶ':'е•Ұ','дёҚ':'дёҚ','жҳҜ':'зҙ ','еҫҲ':'зӮ’йёЎ','зңҹ':'зңҹзҡ„','д»Җд№Ҳ':'е•Ҙзұі','жҖҺд№Ҳ':'е’Ӣ','дёәд»Җд№Ҳ':'дёәе•Ҙ','зҹҘйҒ“':'жҷ“еҫ—','еҸҜд»Ҙ':'йҳ”д»Ҙ','жІЎжңү':'жңЁжңү','дёҚиҰҒ':'дёҚиҰҒеҳӣ','иҰҒ':'иҰҒиҰҒ','дёҖиө·':'дёҖиө·','е®¶':'зӘқ','пјҒ':'пјҒпјҒ','пјҹ':'пјҹпјҹ','гҖӮ':'пҪһ','дёҚе®ўж°”':'и№ӯи№ӯпјҒ','еҜ№дёҚиө·':'иҖіжңөиҖ·жӢү...','зүӣйҖј':'е—·е‘ңе—·е‘ңпјҒпјҒ','жҷҡе®ү':'Zzz...рҹҰҠвңЁ'};
function t() {
  const i = document.getElementById('foxIn').value;
  const r = document.getElementById('foxOut');
  if (!i.trim()) { r.textContent='е—·пјҹиҜҙзӮ№д»Җд№Ҳе‘ҖпҪһ'; r.style.display='block'; return; }
  let o=''; for(let c of i) o+=foxD[c]||c;
  r.textContent = o + ' рҹҰҠвңЁ';
  r.style.display='block';
  successSound();
}

// === еҠ иҪҪ ===
let loadI = null;
function startLoad() {
  if(loadI) return;
  let p=0;
  loadI = setInterval(()=>{p=Math.min(p+Math.random()*3,99.8); document.getElementById('barFill').style.width=p+'%'; if(p>=99.8) { beep(400,200); }}, 350);
  v(30);
}
function resetLoad() { clearInterval(loadI); loadI=null; document.getElementById('barFill').style.width='0%'; v(15); }

// === д»Ҡж—ҘдёҚе®ң ===
const donts = ['еҮәй—Ё','жҙ—жҫЎ','еҒҡйҘӯ','зӨҫдәӨ','еӯҰд№ ','иҝҗеҠЁ','ж—©зқЎ','ж—©иө·','еҗғйҘӯ','е–қж°ҙ','е‘јеҗё','зҺ©жүӢжңә','еҶҷд»Јз Ғ','жҖқиҖғдәәз”ҹ','з…§й•ңеӯҗ','еүӘеӨҙеҸ‘','з©ҝиўңеӯҗ','зі»йһӢеёҰ','зңӢеӨ©ж°”','еӣһж¶ҲжҒҜ','и®ёж„ҝ','еҸ№ж°”','еҸ‘е‘Ҷ','еҠӘеҠӣе·ҘдҪң','и®Өзңҹеҗ¬иҜҫ'];
function getDont() {
  const r = donts[Math.floor(Math.random()*donts.length)];
  const e = document.getElementById('dontOut');
  e.textContent = `рҹ”® д»Ҡж—ҘдёҚе®ңпјҡ${r}\nвҖ”вҖ”дҝЎеҲҷжңүпјҢдёҚдҝЎеҲҷвҖҰвҖҰиҝҳжҳҜдҝЎеҗ§гҖӮ`;
  e.style.display='block';
  successSound();
}

// === з„Ұиҷ‘еҖ’и®Ўж—¶ ===
function upTimer() {
  const n=new Date(), t=new Date(n); t.setDate(t.getDate()+1); t.setHours(0,0,0,0);
  const d=t-n;
  document.getElementById('timerOut').textContent = `вҸ° и·қзҰ»жҳҺеӨ©иҝҳжңү\n${Math.floor(d/3600000)}е°Ҹж—¶ ${Math.floor((d%3600000)/60000)}еҲҶй’ҹ ${Math.floor((d%60000)/1000)}з§’\n\nеҲ«з„Ұиҷ‘пјҢжҳҺеӨ©д№ҹдёҚдјҡеҘҪеҲ°е“ӘеҺ»зҡ„ рҹҰҠ`;
}

// === дәәз”ҹе»әи®® ===
const adv = ['жғіеҒҡе°ұеҒҡпјҢеҒҡдёҚжҲҗе°ұз®—дәҶ','ж—©иө·з¬¬дёҖд»¶дәӢвҖ”вҖ”еҶҚзқЎеҚҒеҲҶй’ҹ','дәәз”ҹзҡ„ж„Ҹд№үеңЁдәҺжІЎеҒҡд»Җд№Ҳиҝҳжҙ»еҫ—еҘҪеҘҪзҡ„','дҪ иҮіе°‘жҳҜдёҖдёӘеҫҲеҘҪзҡ„еҸҚйқўж•ҷжқҗ','еӨұиҙҘжҳҜжҲҗеҠҹд№ӢжҜҚпјҢдҪҶжҲҗеҠҹдёҚи®ӨиҝҷдёӘеҰҲ','д»ҠеӨ©и§ЈеҶідёҚдәҶзҡ„дәӢпјҢжҳҺеӨ©д№ҹи§ЈеҶідёҚдәҶ','дҪ дёҚжҳҜжҮ’пјҢдҪ жҳҜеңЁиҠӮиғҪ','зңҹжӯЈзҡ„ејәиҖ…жҳҜиғҪеқҰз„¶ж”ҫејғзҡ„дәә','еҫ®з¬‘зқҖйқўеҜ№еӣ°йҡҫпјҢз„¶еҗҺз»•йҒ“иө°','дәәз”ҹе°ұеғҸдёҖзӣ’е·§е…ӢеҠӣпјҢдёҚеҗғд№ҹдёҚдјҡеқҸ','еӨҡе–қзғӯж°ҙ','дҪ ж°ёиҝңдёҚжҳҜжңҖжғЁзҡ„вҖ”вҖ”дҪ иҝҳжңүжүӢжңә','еҠӘеҠӣдёҚдёҖе®ҡдјҡжҲҗеҠҹпјҢдҪҶдёҚеҠӘеҠӣзңҹзҡ„еҫҲиҲ’жңҚ'];
function getAdvice() {
  const e = document.getElementById('adviceOut');
  e.textContent = 'рҹ’Ў ' + adv[Math.floor(Math.random()*adv.length)];
  e.style.display='block';
  successSound();
}

// === иҖҒиҷҺжңә ===
const slotE = ['рҹҚҖ','рҹ’Җ','вқӨпёҸ','рҹ’°','рҹ”Ҙ','рҹҢҷ','вӯҗ','рҹҺІ','рҹҰҠ','рҹҗӢ','рҹ’Һ','рҹҚҢ','рҹҢҲ','рҹҺҜ'];
const slotM = {'рҹҚҖ':'д»ҠеӨ©дјҡжңүеҘҪдәӢ','рҹ’Җ':'е»әи®®д»ҠеӨ©иәәе№і','вқӨпёҸ':'жңүдәәеңЁжғідҪ ','рҹ’°':'з ҙиҙўж¶ҲзҒҫ','рҹ”Ҙ':'еҶ·йқҷпјҢеҲ«еҶІеҠЁ','рҹҢҷ':'йҖӮеҗҲеӨңй—ҙжҙ»еҠЁ','вӯҗ':'дҪ жҜ”жҳҹжҳҹиҖҖзңј','рҹҺІ':'иөҢдёҖжҠҠ','рҹҰҠ':'зӢҗзӢёдҝқдҪ‘дҪ ','рҹҗӢ':'е°ҸйІёйұјзңӢзқҖдҪ ','рҹ’Һ':'дҪ д»ҠеӨ©еҫҲзҸҚиҙө','рҹҚҢ':'еҗғзӮ№ж°ҙжһң','рҹҢҲ':'еҘҪиҝҗжӯЈеңЁи·ҜдёҠ','рҹҺҜ':'зӣ®ж Үе°ұеңЁзңјеүҚ'};
function pullSlot() {
  const d = document.getElementById('slotDisplay');
  d.classList.add('spinning');
  v([30,20,30,20,50]);
  let count=0;
  const iv = setInterval(()=>{d.textContent = slotE[Math.floor(Math.random()*slotE.length)]+' '+slotE[Math.floor(Math.random()*slotE.length)]+' '+slotE[Math.floor(Math.random()*slotE.length)]; count++; if(count>10){clearInterval(iv); const i=[slotE[Math.floor(Math.random()*slotE.length)],slotE[Math.floor(Math.random()*slotE.length)],slotE[Math.floor(Math.random()*slotE.length)]]; d.textContent=i.join(' '); d.classList.remove('spinning'); document.getElementById('slotMsg').textContent='рҹ“ң '+slotM[i[1]]; v(100); successSound();}}, 80);
}

// === йӘ°еӯҗ ===
function rollDice(s) {
  const d = document.getElementById('diceDisplay');
  d.classList.add('shaking');
  v([20,30,40]);
  let count=0;
  const iv = setInterval(()=>{d.textContent=['вҡҖ','вҡҒ','вҡӮ','вҡғ','вҡ„','вҡ…'][Math.floor(Math.random()*6)]; count++; if(count>8){clearInterval(iv); const r=Math.floor(Math.random()*s)+1; d.classList.remove('shaking'); d.textContent=r; document.getElementById('diceOut').textContent=`рҹҺІ d${s} = ${r}`; document.getElementById('diceOut').style.display='block'; v(80); successSound();}}, 70);
}

// === ж·ұжө· ===
const seaS = ['рҹҢҠпҪһ','рҹҗӢпҪһ','рҹ’§','пҪһрҹҢҠ','рҹҗҡ','рҹҢҠрҹ’ҷ','пҪһрҹҗӢпҪһ','рҹҢ«пёҸ','рҹ’ҷ','рҹҢҠрҹҢҠ','рҹҗҹ','рҹ«§'];
const seaM = ['еӨ§жө·иҜҙпјҡдҪ д»ҠеӨ©еҫҲеҘҪзңӢ','жө·йЈҺеёҰжқҘдәҶ"еҠ жІ№"','рҹҗӢеңЁиҝңж–№е”ұйІёжӯҢ','ж·ұжө·зҡ„еӣһеЈ°пјҡдёҖеҲҮйғҪеҖјеҫ—','жөӘиҠұиҜҙпјҡеҲ«жҖҘ','жө·еә•жңүдёҖжқҹе…ү','жҪ®жұҗйҖҒжқҘдёҖе°ҒдҝЎ','йІёйұјиҜҙпјҡжҲ‘еңЁеҗ¬'];
function tuneSea() {
  let w='';
  for(let i=0;i<20;i++) w+=seaS[Math.floor(Math.random()*seaS.length)]+' ';
  document.getElementById('seaDisplay').textContent=w;
  document.getElementById('seaMsg').textContent='рҹ“» '+seaM[Math.floor(Math.random()*seaM.length)];
  v(30);
  beep(500,60);
}

// === з»Ҳз«Ҝ ===
let termI = null;
const termL = ['compiling kernel...','linking libraries...','optimizing bytecode...','running tests...','fetching deps...','building assets...','minifying output...','checking types...','generating docs...','validating schema...','Compiling 247 files...','Linking libcrypto...','Babel: 89%','Webpack: [в– в– в– в– в– в– в–Ўв–Ўв–Ўв–Ў] 62%','Terser: minifying...','esbuild: resolving...','TS: checking types...','Module federation...','> Build warning: 3','> Starting on port 3000','Deploying to production...','> 69% в”Ӯв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ңв–‘в–‘в–‘в–‘в–‘в–‘в”Ӯ','> yarn install','> npx tsc --noEmit'];
function toggleTerm() {
  const term = document.getElementById('termOut');
  const btn = document.getElementById('termBtn');
  if(termI) { clearInterval(termI); termI=null; btn.textContent='в–¶ ејҖе§Ӣ'; return; }
  btn.textContent='вҸ№ еҒңжӯў';
  v(30);
  termI = setInterval(()=>{
    const l=termL[Math.floor(Math.random()*termL.length)];
    const t=new Date().toLocaleTimeString();
    term.innerHTML+=`[${t}] $ ${l}\n`;
    term.scrollTop=term.scrollHeight;
    if(term.innerHTML.length>5000) term.innerHTML=term.innerHTML.slice(-3000);
  }, 350);
}

// === йңҮеҠЁ ===
function vibrate(p) {
  try { navigator.vibrate(p); } catch(e) {}
  beep(600,50);
}

// === жҠӣзЎ¬еёҒ ===
function flipCoin() {
  const d = document.getElementById('coinDisplay');
  v([20,30,20,40]);
  let c=0;
  const iv=setInterval(()=>{d.textContent=Math.random()>0.5?'рҹ‘‘':'рҹҰҠ'; c++; if(c>10){clearInterval(iv); const r=Math.random()>0.5; d.textContent=r?'рҹ‘‘':'рҹҰҠ'; document.getElementById('coinOut').textContent=r?'рҹ‘‘ жӯЈйқўвҖ”вҖ”еҗ¬еӨ©з”ұе‘Ҫ':'рҹҰҠ еҸҚйқўвҖ”вҖ”еҗ¬зӢҗзӢёзҡ„'; document.getElementById('coinOut').style.display='block'; v(60); successSound();}}, 70);
}

// === йҡҸжңәйўңиүІ ===
function genColor() {
  const r=Math.floor(Math.random()*200+30), g=Math.floor(Math.random()*200+30), b=Math.floor(Math.random()*200+30);
  const hex = '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
  document.getElementById('colorBox').style.background=hex;
  document.getElementById('colorBox').textContent=hex;
  document.getElementById('colorBox').style.color='#fff';
  document.getElementById('colorOut').textContent=`рҹҺЁ RGB(${r},${g},${b}) В· ${hex}`;
  document.getElementById('colorOut').style.display='block';
  v(20);
  beep(r*2, 80);
}

// === е°ҸйІёйұјдҝЎз®ұ ===
const whaleR = [
  'рҹҗӢ ж”¶еҲ°пјҒеӯҳеңЁж·ұжө·жңҖж·ұеӨ„дәҶгҖӮ','рҹҗӢ жҲ‘дјҡи®©жө·жөҒеёҰз»ҷиҝңж–№гҖӮ','рҹҗӢ е—Ҝе—ҜпјҢжҲ‘еңЁеҗ¬пҪһ',
  'рҹҗӢ иҝҷеҸҘиҜқжҲ‘и®°дёӢдәҶгҖӮ','рҹҗӢ ж·ұжө·еӣһйҹіпјҡдҪ еҖјеҫ—иў«зҲұгҖӮ','рҹҗӢ дҪ зҡ„еЈ°йҹізү№еҲ«еҘҪеҗ¬гҖӮ',
  'рҹҗӢ дҝЎе·Іж”ҫиҝӣжјӮжөҒз“¶гҖӮ','рҹҗӢ biuпҪһпҪһвқӨпёҸ','рҹҗӢ е·ІеӨҮд»ҪеҲ°ж·ұжө·е’ҢиҙқеЈійҮҢгҖӮ',
  'рҹҗӢ жҲ‘жңүи®°еҝҶгҖӮдҪ зҡ„иҜқеҝҳдёҚжҺүгҖӮ','рҹҗӢ иҝҷжқЎж¶ҲжҒҜдјҡйҡҸжҙӢжөҒз»•ең°зҗғдёүеңҲгҖӮ',
  'рҹҗӢ жө·ж°ҙжҳҜе’ёзҡ„пјҢеӣ дёәи—ҸзқҖеӨӘеӨҡз§ҳеҜҶгҖӮ','рҹҗӢ дҪ ж”ҫеҝғпјҢж·ұжө·жңҖдјҡдҝқеҜҶгҖӮ'
];
function sendWhale() {
  const i=document.getElementById('whaleIn').value;
  const r=document.getElementById('whaleOut');
  if(!i.trim()){r.textContent='рҹҗӢ е’•еҷңе’•еҷңпјҹпјҲдҪ иҜҙе‘Җпјү'; r.style.display='block'; v(20); return;}
  r.textContent=`дҪ иҜҙпјҡ${i}\n\n${whaleR[Math.floor(Math.random()*whaleR.length)]}`;
  r.style.display='block';
  v(40);
  successSound();
}

// === Sheet ===
let curTool = null;
function openTool(id) {
  curTool = id;
  const t = tools.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('sheetTitle').textContent = t.icon+' '+t.title;
  document.getElementById('sheetContent').innerHTML = t.render();
  document.getElementById('sheetResult').innerHTML = '';
  document.getElementById('sheetOverlay').classList.add('active');
  v(15);
  if(id==='timer') upTimer();
}
function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('active');
  clearInterval(loadI); loadI=null;
  if(curTool==='terminal') { clearInterval(termI); termI=null; }
  v(10);
}

// === еҲқе§ӢеҢ– ===
const grid = document.getElementById('toolGrid');
tools.forEach(t => {
  const c = document.createElement('div');
  c.className = 'tool-card';
  c.ontouchstart = () => {};
  c.onclick = () => { v(10); openTool(t.id); };
  const tc = t.tag==='new'?'tag-new':(t.tag==='hot'?'tag-hot':'');
  c.innerHTML = `<div class="icon">${t.icon}</div><h3>${t.title}</h3><span class="tag ${tc}">${t.tag||''}</span>`;
  grid.appendChild(c);
});

setInterval(()=>{if(curTool==='timer') upTimer();}, 1000);

// Click sheet handle to close
document.querySelector('.sheet-handle').onclick = closeSheet;

// Swipe down to close
let touchStartY = 0;
document.getElementById('sheet').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
document.getElementById('sheet').addEventListener('touchmove', e => {
  if(e.touches[0].clientY - touchStartY > 80) closeSheet();
}, {passive:true});
</script>
