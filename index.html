<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦊 Useless Toolbox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --bg: #0a0a12; --card: #0f0f1c; --border: #1e1e2e; --text: #c0c0d0; --accent: #f0a030; --dim: #606070; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }
  .container { max-width: 800px; width: 100%; padding: 1rem; }
  header {
    text-align: center;
    margin-bottom: 1.2rem;
    padding: 1.5rem 1rem;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: linear-gradient(135deg, #0f0f1a 0%, #151528 100%);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(240,160,48,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; color: #e0e0f0; letter-spacing: 1px; }
  header h1 span { color: var(--accent); }
  header p { color: var(--dim); margin-top: 0.3rem; font-size: 0.8rem; }
  .badge-row { margin-top: 0.6rem; display: flex; justify-content: center; gap: 0.4rem; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.2rem 0.6rem; border-radius: 20px;
    font-size: 0.6rem; font-weight: 600;
  }
  .badge-mit { background: #122212; color: #60a060; border: 1px solid #1a3a1a; }
  .badge-online { background: #0f1f2f; color: #5090b0; border: 1px solid #1a2a3a; }
  .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #60c060; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
  .tool-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.9rem 0.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    min-height: 95px;
    touch-action: manipulation;
  }
  .tool-card:active { transform: scale(0.94); background: #141428; }
  .tool-card .icon { font-size: 1.6rem; margin-bottom: 0.3rem; }
  .tool-card h3 { font-size: 0.75rem; font-weight: 600; color: #d0d0e0; line-height: 1.2; }
  .tool-card p { font-size: 0.6rem; color: var(--dim); margin-top: 0.2rem; line-height: 1.3; display: none; }
  .tool-card .tag {
    position: absolute; top: 0.3rem; right: 0.3rem;
    font-size: 0.5rem; padding: 0.1rem 0.3rem; border-radius: 4px;
    background: #1a1a2a; color: var(--dim);
  }
  .tool-card .tag-hot { background: #2a1a1a; color: #d07070; }
  .tool-card .tag-new { background: #0a2a1a; color: #60d060; }
  
  /* Bottom Sheet Modal */
  .sheet-overlay {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    animation: fadeIn 0.2s ease;
  }
  .sheet-overlay.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #12121e;
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 1.2rem 1.2rem calc(1.2rem + env(safe-area-inset-bottom));
    max-height: 75vh;
    overflow-y: auto;
    z-index: 101;
    animation: sheetUp 0.3s ease;
    touch-action: pan-y;
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: #3a3a4a; border-radius: 2px;
    margin: 0 auto 1rem;
  }
  .sheet h2 { font-size: 1.1rem; color: #e0e0f0; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .sheet .close-sheet {
    position: absolute; top: 1rem; right: 1rem;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: #1a1a2a;
    border: none;
    color: var(--dim);
    font-size: 1.2rem;
    cursor: pointer;
    touch-action: manipulation;
  }
  .sheet .close-sheet:active { background: #2a2a3a; }
  .sheet-content { color: var(--text); line-height: 1.6; font-size: 0.9rem; }
  .sheet-content textarea, .sheet-content input {
    width: 100%;
    padding: 0.8rem;
    background: #0a0a12;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #d0d0e0;
    font-family: inherit;
    font-size: 0.9rem;
    margin: 0.5rem 0;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .sheet-content textarea:focus, .sheet-content input:focus { border-color: var(--accent); }
  .sheet-content button {
    padding: 0.7rem 1.4rem;
    background: linear-gradient(135deg, var(--accent), #d08020);
    border: none;
    border-radius: 10px;
    color: #0a0a0f;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.9rem;
    touch-action: manipulation;
    width: 100%;
  }
  .sheet-content button:active { transform: scale(0.96); }
  .sheet-content .btn-sec {
    background: #2a2a3a;
    color: var(--text);
    margin-top: 0.4rem;
  }
  .result-box {
    background: #0a0a12;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    margin-top: 0.8rem;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: #60c060;
    white-space: pre-wrap;
    line-height: 1.5;
    animation: resultIn 0.3s ease;
  }
  @keyframes resultIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .footer {
    text-align: center;
    margin-top: 2rem;
    padding: 1rem;
    font-size: 0.65rem;
    color: #404050;
  }
  .footer a { color: #4070a0; text-decoration: none; }
  
  /* Progress bar */
  .bar-track { background: #1a1a2a; border-radius: 8px; height: 14px; overflow: hidden; margin: 0.5rem 0; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #e06030); border-radius: 8px; transition: width 0.3s; }
  
  /* Slot machine */
  .slot-display {
    font-size: 2.8rem; text-align: center; padding: 1.2rem;
    background: #0a0a12; border-radius: 12px; margin-bottom: 0.8rem;
    border: 1px solid var(--border); letter-spacing: 8px;
  }
  .slot-display.spinning { animation: spin 0.15s linear infinite; }
  @keyframes spin { 0%{transform:translateY(0)} 25%{transform:translateY(-2px)} 50%{transform:translateY(0)} 75%{transform:translateY(2px)} 100%{transform:translateY(0)} }
  
  /* Terminal */
  .terminal {
    background: #000; border-radius: 10px; padding: 0.7rem;
    font-family: 'Courier New', monospace; font-size: 0.65rem;
    color: #50b050; height: 200px; overflow-y: auto;
    border: 1px solid #1a3a1a; line-height: 1.5; margin: 0.5rem 0;
  }
  
  /* Dice */
  .dice-display {
    font-size: 4rem; text-align: center; padding: 1rem;
    background: #0a0a12; border-radius: 12px; margin-bottom: 0.8rem;
    border: 1px solid var(--border);
    transition: transform 0.1s;
  }
  .dice-display.shaking { animation: shake 0.1s linear 6; }
  @keyframes shake { 0%{transform:rotate(0deg)} 25%{transform:rotate(-10deg)} 75%{transform:rotate(10deg)} 100%{transform:rotate(0deg)} }
  
  @media (max-width: 400px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 0.4rem; } .tool-card { padding: 0.7rem 0.3rem; min-height: 80px; } .tool-card .icon { font-size: 1.3rem; } .tool-card h3 { font-size: 0.65rem; } }
  @media (min-width: 600px) { .grid { grid-template-columns: repeat(4, 1fr); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🦊 <span>Useless</span> Toolbox</h1>
    <p>看起来很牛逼实则没啥用的工具箱</p>
    <div class="badge-row">
      <span class="badge badge-mit">MIT</span>
      <span class="badge badge-online"><span class="dot"></span>online</span>
    </div>
  </header>
  <div class="grid" id="toolGrid"></div>
  <div class="footer">🦊 + 🐋 · <a href="ADDITIONAL_LICENSE.md">BQ-CNfurry1.0</a></div>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <button class="close-sheet" onclick="closeSheet()">×</button>
  <h2 id="sheetTitle"></h2>
  <div class="sheet-content" id="sheetContent"></div>
  <div id="sheetResult"></div>
</div>

<script>
// === 工具定义 ===
const tools = [
  { id:'fox', icon:'🦊', title:'狐狸语', tag:'hot',
    render:()=>`<textarea id="foxIn" rows="2" placeholder="输入你想说的话..."></textarea><button ontouchstart="" onclick="v();t()">翻译 🦊</button><div id="foxOut" class="result-box" style="display:none"></div>` },
  { id:'loading', icon:'⏳', title:'假装加载', tag:'',
    render:()=>`<p style="color:var(--dim);font-size:0.8rem">永远到不了100%的进度条</p><div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div><button ontouchstart="" onclick="v();startLoad()">🚀 开始</button><button class="btn-sec" ontouchstart="" onclick="v();resetLoad()">重置</button>` },
  { id:'dont', icon:'📅', title:'今日不宜', tag:'',
    render:()=>`<button ontouchstart="" onclick="v();getDont()">🔮 看看今天不宜什么</button><div id="dontOut" class="result-box" style="display:none"></div>` },
  { id:'timer', icon:'⏰', title:'焦虑倒计时', tag:'',
    render:()=>`<div id="timerOut" class="result-box" style="text-align:center;font-size:1rem">加载中...</div>` },
  { id:'advice', icon:'💡', title:'人生建议', tag:'',
    render:()=>`<button ontouchstart="" onclick="v();getAdvice()">💡 给我建议</button><div id="adviceOut" class="result-box" style="display:none"></div>` },
  { id:'slot', icon:'🎰', title:'命运老虎机', tag:'new',
    render:()=>`<div class="slot-display" id="slotDisplay">🎰</div><div id="slotMsg" style="text-align:center;margin-bottom:0.5rem;color:var(--dim);font-size:0.8rem;min-height:1.2rem"></div><button ontouchstart="" onclick="v();pullSlot()">🎰 拉下摇杆</button>` },
  { id:'dice', icon:'🎲', title:'骰子', tag:'new',
    render:()=>`<div class="dice-display" id="diceDisplay">🎲</div><div style="display:flex;gap:0.5rem"><button ontouchstart="" onclick="v();rollDice(6)" style="flex:1">🎲 d6</button><button ontouchstart="" onclick="v();rollDice(20)" style="flex:1">🎲 d20</button></div><button class="btn-sec" ontouchstart="" onclick="v();rollDice(100)" style="margin-top:0.4rem">🎲 d100</button><div id="diceOut" class="result-box" style="display:none"></div>` },
  { id:'sea', icon:'🌊', title:'深海收音机', tag:'new',
    render:()=>`<p style="color:#5090b0;font-size:0.75rem;text-align:center">📡 频率：深海 ∞ Hz</p><div id="seaDisplay" style="font-size:1.3rem;letter-spacing:4px;line-height:1.8;padding:1rem;background:#0a0a12;border-radius:10px;border:1px solid #1a2a3a;min-height:80px;word-break:break-all;margin:0.5rem 0">🌊～🐋～💧</div><button ontouchstart="" onclick="v();tuneSea()">📡 调频</button><div id="seaMsg" style="margin-top:0.5rem;color:#5090b0;font-style:italic;text-align:center;min-height:1.5rem;font-size:0.8rem"></div>` },
  { id:'terminal', icon:'📟', title:'假装很忙', tag:'new',
    render:()=>`<div class="terminal" id="termOut"></div><button ontouchstart="" onclick="v();toggleTerm()" id="termBtn">▶ 开始</button>` },
  { id:'vibe', icon:'📳', title:'震动机', tag:'new',
    render:()=>`<p style="color:var(--dim);font-size:0.8rem;text-align:center">用不同的方式震动你的手机</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;margin:0.5rem 0"><button ontouchstart="" onclick="v();vibrate(50)">轻震</button><button ontouchstart="" onclick="v();vibrate(100)">中震</button><button ontouchstart="" onclick="v();vibrate(300)">强震</button><button ontouchstart="" onclick="v();vibrate([100,50,100,50,200])">节奏</button></div><button ontouchstart="" onclick="v();vibrate([200,100,200,100,200,100,500])">🚨 紧急模式</button>` },
  { id:'coin', icon:'🪙', title:'抛硬币', tag:'',
    render:()=>`<div style="font-size:5rem;text-align:center;padding:1rem" id="coinDisplay">🪙</div><button ontouchstart="" onclick="v();flipCoin()">🪙 抛！</button><div id="coinOut" class="result-box" style="display:none"></div>` },
  { id:'color', icon:'🎨', title:'随机颜色', tag:'',
    render:()=>`<div id="colorBox" style="height:120px;border-radius:12px;background:#1a1a2a;margin-bottom:0.5rem;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;transition:background 0.3s">点我生成</div><button ontouchstart="" onclick="v();genColor()">🎨 生成颜色</button><div id="colorOut" class="result-box" style="display:none"></div>` },
  { id:'whale', icon:'🐋', title:'小鲸鱼信箱', tag:'🐋',
    render:()=>`<textarea id="whaleIn" rows="2" placeholder="写下你想对小鲸鱼说的话..."></textarea><button ontouchstart="" onclick="v();sendWhale()">发送 🐋</button><div id="whaleOut" class="result-box" style="display:none"></div>` },
  { id:'dart', icon:'🎯', title:'决策飞镖', tag:'new',
    render:()=>`<p style="color:var(--dim);font-size:0.8rem;text-align:center">让飞镖帮你做决定</p><div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin:0.5rem 0" id="dartOpts"><input id="dartOpt" style="flex:1;min-width:100px" placeholder="选项..."><button ontouchstart="" onclick="v();addDartOpt()" style="width:auto;padding:0.5rem 1rem;flex:0">➕</button></div><div id="dartList" style="display:flex;flex-wrap:wrap;gap:0.3rem;min-height:1.5rem;margin-bottom:0.5rem"></div><button ontouchstart="" onclick="v();throwDart()">🎯 掷飞镖！</button><div id="dartOut" class="result-box" style="display:none"></div>` },
  { id:'gacha', icon:'🃏', title:'抽卡模拟器', tag:'new',
    render:()=>`<p style="color:var(--dim);font-size:0.8rem;text-align:center">试试你的运气</p><div id="gachaDisplay" style="font-size:3rem;text-align:center;padding:1rem;background:#0a0a12;border-radius:12px;margin-bottom:0.5rem;border:1px solid var(--border);min-height:80px">🎴</div><div id="gachaRarity" style="text-align:center;font-size:0.8rem;margin-bottom:0.5rem;min-height:1.2rem"></div><button ontouchstart="" onclick="v();pullGacha()">🃏 抽一张</button><button class="btn-sec" ontouchstart="" onclick="v();pullGacha10()">🃏 抽十连</button><div id="gachaOut" class="result-box" style="display:none"></div>` },
  { id:'crystal', icon:'🔮', title:'水晶球占卜', tag:'new',
    render:()=>`<div style="text-align:center;padding:1rem"><div id="crystalBall" style="font-size:5rem;margin-bottom:0.5rem;transition:all 0.5s">🔮</div><p style="color:var(--dim);font-size:0.8rem">凝视水晶球，寻找答案</p></div><input id="crystalQ" placeholder="问水晶球一个问题..." style="margin-bottom:0.3rem"><button ontouchstart="" onclick="v();askCrystal()">🔮 占卜</button><div id="crystalOut" class="result-box" style="display:none"></div>` },
  { id:'luck', icon:'🎪', title:'今日人品', tag:'new',
    render:()=>`<button ontouchstart="" onclick="v();checkLuck()">🎪 测今日人品</button><div id="luckOut" class="result-box" style="display:none"></div>` },
  { id:'slacker', icon:'⏱️', title:'摸鱼计时器', tag:'new',
    render:()=>`<p style="color:var(--dim);font-size:0.8rem;text-align:center">距离下班/放学还有多久</p><div style="display:flex;gap:0.5rem;margin:0.5rem 0"><input id="slackerH" type="number" placeholder="17" style="flex:1;text-align:center"><span style="display:flex;align-items:center;color:var(--dim)">:</span><input id="slackerM" type="number" placeholder="00" style="flex:1;text-align:center"></div><p style="text-align:center;font-size:0.7rem;color:var(--dim)">输入下班时间 (24小时制)</p><button ontouchstart="" onclick="v();startSlacker()">⏱️ 开始摸鱼</button><div id="slackerOut" class="result-box" style="display:none"></div>` }
];

// === 音效 (Web Audio) ===
let audioCtx = null;
function beep(freq=800, dur=60) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq;
    g.gain.value = 0.1;
    o.start(); o.stop(audioCtx.currentTime + dur/1000);
  } catch(e) {}
}
function clickSound() { beep(1000, 40); }
function successSound() { beep(660,80); setTimeout(()=>beep(880,100), 80); }
function failSound() { beep(300,150); }

// === 震动 ===
function v(pattern) {
  try { navigator.vibrate(pattern || 15); } catch(e) {}
  clickSound();
}

// === 狐狸语 ===
const foxD = {'你好':'嗷呜！','谢谢':'蹭蹭～','喜欢':'呜呜❤️','好吃':'吧唧吧唧','睡觉':'Zzz...🦊','走':'嗒嗒嗒','开心':'尾巴摇成螺旋桨！','难过':'耳朵耷拉...','饿':'肚子咕咕叫','想':'呜呜想念','我':'本狐','你':'你','吗':'嘛？','的':'の','啊':'呀','了':'啦','不':'不','是':'素','很':'炒鸡','真':'真的','什么':'啥米','怎么':'咋','为什么':'为啥','知道':'晓得','可以':'阔以','没有':'木有','不要':'不要嘛','要':'要要','一起':'一起','家':'窝','！':'！！','？':'？？','。':'～','不客气':'蹭蹭！','对不起':'耳朵耷拉...','牛逼':'嗷呜嗷呜！！','晚安':'Zzz...🦊✨'};
function t() {
  const i = document.getElementById('foxIn').value;
  const r = document.getElementById('foxOut');
  if (!i.trim()) { r.textContent='嗷？说点什么呀～'; r.style.display='block'; return; }
  let o=''; for(let c of i) o+=foxD[c]||c;
  r.textContent = o + ' 🦊✨';
  r.style.display='block';
  successSound();
}

// === 加载 ===
let loadI = null;
function startLoad() {
  if(loadI) return;
  let p=0;
  loadI = setInterval(()=>{p=Math.min(p+Math.random()*3,99.8); document.getElementById('barFill').style.width=p+'%'; if(p>=99.8) { beep(400,200); }}, 350);
  v(30);
}
function resetLoad() { clearInterval(loadI); loadI=null; document.getElementById('barFill').style.width='0%'; v(15); }

// === 今日不宜 ===
const donts = ['出门','洗澡','做饭','社交','学习','运动','早睡','早起','吃饭','喝水','呼吸','玩手机','写代码','思考人生','照镜子','剪头发','穿袜子','系鞋带','看天气','回消息','许愿','叹气','发呆','努力工作','认真听课'];
function getDont() {
  const r = donts[Math.floor(Math.random()*donts.length)];
  const e = document.getElementById('dontOut');
  e.textContent = `🔮 今日不宜：${r}\n——信则有，不信则……还是信吧。`;
  e.style.display='block';
  successSound();
}

// === 焦虑倒计时 ===
function upTimer() {
  const n=new Date(), t=new Date(n); t.setDate(t.getDate()+1); t.setHours(0,0,0,0);
  const d=t-n;
  document.getElementById('timerOut').textContent = `⏰ 距离明天还有\n${Math.floor(d/3600000)}小时 ${Math.floor((d%3600000)/60000)}分钟 ${Math.floor((d%60000)/1000)}秒\n\n别焦虑，明天也不会好到哪去的 🦊`;
}

// === 人生建议 ===

// === 终端 ===
let termI = null;
const termL = ['compiling kernel...','linking libraries...','optimizing bytecode...','running tests...','fetching deps...','building assets...','minifying output...','checking types...','generating docs...','validating schema...','Compiling 247 files...','Linking libcrypto...','Babel: 89%','Webpack: [■■■■■■□□□□] 62%','Terser: minifying...','esbuild: resolving...','TS: checking types...','Module federation...','> Build warning: 3','> Starting on port 3000','Deploying to production...','> 69% │██████████▌░░░░░░│','> yarn install','> npx tsc --noEmit'];
function toggleTerm() {
  const term = document.getElementById('termOut');
  const btn = document.getElementById('termBtn');
  if(termI) { clearInterval(termI); termI=null; btn.textContent='▶ 开始'; return; }
  btn.textContent='⏹ 停止';
  v(30);
  termI = setInterval(()=>{
    const l=termL[Math.floor(Math.random()*termL.length)];
    const t=new Date().toLocaleTimeString();

// === 震动 ===
function vibrate(p) {
  try { navigator.vibrate(p); } catch(e) {}
  beep(600,50);
}

// === 抛硬币 ===
function flipCoin() {

// === 随机颜色 ===
function genColor() {
  const r=Math.floor(Math.random()*200+30), g=Math.floor(Math.random()*200+30), b=Math.floor(Math.random()*200+30);
  const hex = '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');

// === 决策飞镖 ===
const dartOpts = [];
function addDartOpt() {
  const v = document.getElementById('dartOpt').value.trim();
  if (!v) return;
  dartOpts.push(v);
  document.getElementById('dartOpt').value = '';
  renderDartList();
  v(10);
}
function renderDartList() {
  const list = document.getElementById('dartList');
  list.innerHTML = dartOpts.map((o,i) => `<span style="background:#1a1a2a;padding:0.2rem 0.5rem;border-radius:6px;font-size:0.75rem;display:inline-flex;align-items:center;gap:0.3rem">${o}<span onclick="v();removeDartOpt(${i})" style="cursor:pointer;color:var(--dim)">×</span></span>`).join('');
}
function removeDartOpt(i) { dartOpts.splice(i,1); renderDartList(); }
function throwDart() {
  if (!dartOpts.length) { document.getElementById('dartOut').textContent = '🎯 先加几个选项呀！'; document.getElementById('dartOut').style.display='block'; return; }
  v([30,50,80]);

}

// === 抽卡模拟器 ===
const gachaPool = [
  {name:'🌟 SSR 小鲸鱼',rate:0.02,color:'#f0a030'},
  {name:'🌟 SSR 深海之主',rate:0.03,color:'#f0a030'},
  {name:'⭐ SR 狐狸使者',rate:0.08,color:'#a080d0'},
  {name:'⭐ SR 月光精灵',rate:0.08,color:'#a080d0'},
  {name:'⭐ SR 浪花骑士',rate:0.09,color:'#a080d0'},
  {name:'📖 R 普通路人甲',rate:0.20,color:'#6090d0'},
  {name:'📖 R 隔壁班同学',rate:0.20,color:'#6090d0'},
  {name:'📖 R 食堂大妈',rate:0.15,color:'#6090d0'},
  {name:'📖 R 班主任',rate:0.10,color:'#6090d0'},
  {name:'🌿 N 一片树叶',rate:0.05,color:'#80a080'}
];
function doGacha() {
  const r = Math.random();
  let acc=0;
  for (const item of gachaPool) { acc+=item.rate; if(r<acc) return item; }
  return gachaPool[gachaPool.length-1];
}
function pullGacha() {
  v([20,30]);
  let c=0;
  const iv=setInterval(()=>{document.getElementById('gachaDisplay').textContent=['🎴','🃏','⭐','🌟'][Math.floor(Math.random()*4)]; c++; if(c>8){clearInterval(iv); const r=doGacha(); document.getElementById('gachaDisplay').textContent=r.name[0]; document.getElementById('gachaRarity').innerHTML=`<span style="color:${r.color};font-weight:700">${r.name}</span>`; document.getElementById('gachaOut').textContent=`🎴 你抽到了：${r.name}`; document.getElementById('gachaOut').style.display='block'; v(60); successSound();}},80);
}
function pullGacha10() {
  v([20,20,30,30,50]);
  const results = [];
  for(let i=0;i<10;i++) results.push(doGacha());
  const ssr = results.filter(r=>r.name.startsWith('🌟'));
  const sr = results.filter(r=>r.name.startsWith('⭐'));
  document.getElementById('gachaDisplay').textContent = ssr.length ? '🌟' : (sr.length ? '⭐' : '📖');
  document.getElementById('gachaRarity').innerHTML = ssr.length ? `<span style="color:#f0a030;font-weight:700">${ssr.length}个SSR！</span>` : (sr.length ? `<span style="color:#a080d0;font-weight:700">${sr.length}个SR</span>` : `<span style="color:var(--dim)">保底了...</span>`);
  document.getElementById('gachaOut').textContent = `🃏 十连结果：\n${results.map(r=>r.name).join('\n')}`;
  document.getElementById('gachaOut').style.display='block';
  if(ssr.length) { v([100,50,100,50,200]); setTimeout(()=>successSound(),100); } else v(30);
}

// === 摸鱼计时器 ===
let slackerI = null;
function startSlacker() {
  const h = parseInt(document.getElementById('slackerH').value) || 17;
  const m = parseInt(document.getElementById('slackerM').value) || 0;
  const e = document.getElementById('slackerOut');
  e.style.display='block';
  if(slackerI) clearInterval(slackerI);
  slackerI = setInterval(()=>{
    const n=new Date();
    const target = new Date(n); target.setHours(h,m,0,0);
    if(n>target){target.setDate(target.getDate()+1);}
    const d=target-n;
    const hh=Math.floor(d/3600000), mm=Math.floor((d%3600000)/60000), ss=Math.floor((d%60000)/1000);
    e.textContent = `⏱️ 距离 ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')} 还有\n${hh}小时 ${mm}分 ${ss}秒\n\n${hh<1?'马上就能跑路了！加油！':'再坚持一下...'}`;
  }, 1000);
  v(30);
}

// === Sheet ===
let curTool = null;
function openTool(id) {
  curTool = id;
  const t = tools.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('sheetTitle').textContent = t.icon+' '+t.title;
  document.getElementById('sheetContent').innerHTML = t.render();
  document.getElementById('sheetResult').innerHTML = '';
  document.getElementById('sheetOverlay').classList.add('active');
  v(15);
  if(id==='timer') upTimer();
}
function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('active');
  clearInterval(loadI); loadI=null;
  if(curTool==='terminal') { clearInterval(termI); termI=null; }
  v(10);
}

// === 初始化 ===
const grid = document.getElementById('toolGrid');
tools.forEach(t => {
  const c = document.createElement('div');
  c.className = 'tool-card';
  c.ontouchstart = () => {};
  c.onclick = () => { v(10); openTool(t.id); };
  const tc = t.tag==='new'?'tag-new':(t.tag==='hot'?'tag-hot':'');
  c.innerHTML = `<div class="icon">${t.icon}</div><h3>${t.title}</h3><span class="tag ${tc}">${t.tag||''}</span>`;
  grid.appendChild(c);
});

setInterval(()=>{if(curTool==='timer') upTimer();}, 1000);

// Click sheet handle to close
document.querySelector('.sheet-handle').onclick = closeSheet;

// Swipe down to close
let touchStartY = 0;
document.getElementById('sheet').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
document.getElementById('sheet').addEventListener('touchmove', e => {
  if(e.touches[0].clientY - touchStartY > 80) closeSheet();
}, {passive:true});
</script>
